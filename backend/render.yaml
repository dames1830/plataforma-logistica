services:
  - type: web
    name: logistics-backend
    env: python
    rootDir: backend
    region: ohio
    plan: starter # Plan mensual $7 de Render
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: "/data/database.db"
      - key: PYTHON_VERSION
        value: "3.11.9"
